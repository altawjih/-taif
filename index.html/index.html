<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج رصد مشكلة سلوكية</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Tahoma, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #1f2937;
      line-height: 1.8;
    }

    header {
      background: linear-gradient(135deg, #0f766e, #2563eb);
      color: white;
      padding: 35px 8%;
      text-align: center;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    header p {
      margin: 0;
      color: #e5e7eb;
    }

    main {
      padding: 35px 8%;
      max-width: 1100px;
      margin: auto;
    }

    .box {
      background: white;
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 0;
      color: #0f766e;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .dark {
      background: #111827;
      color: white;
    }

    .gray {
      background: #6b7280;
      color: white;
    }

    #previewBox {
      display: none;
    }

    #report {
      background: white;
      padding: 35px;
      color: #111827;
      width: 794px;
      min-height: 1123px;
      margin: auto;
      direction: rtl;
    }

    .report-head {
      text-align: center;
      border-bottom: 3px solid #0f766e;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .report-head h1 {
      margin: 0;
      font-size: 26px;
    }

    .report-head p {
      margin: 5px 0 0;
      color: #374151;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .item {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px;
      background: #f9fafb;
    }

    .item strong {
      color: #0f766e;
    }

    .section {
      margin-top: 18px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      min-height: 60px;
      white-space: pre-line;
    }

    .section-title {
      font-weight: bold;
      color: #2563eb;
      margin: 18px 0 8px;
    }

    .signatures {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 45px;
      text-align: center;
    }

    .sig {
      border-top: 1px solid #111827;
      padding-top: 10px;
      min-height: 60px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111827;
      color: white;
      margin-top: 30px;
    }

    @media print {
      body {
        background: white;
      }

      header, .box, footer, .btns {
        display: none !important;
      }

      #previewBox {
        display: block !important;
        box-shadow: none;
      }

      #report {
        width: 100%;
        min-height: auto;
        padding: 20px;
      }
    }

    @media (max-width: 800px) {
      .grid,
      .report-grid,
      .signatures {
        grid-template-columns: 1fr;
      }

      #report {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>نموذج رصد مشكلة سلوكية</h1>
  <p>خاص بالمعلم والموجه الطلابي وفق قواعد السلوك والمواظبة</p>
</header>

<main>

  <div class="box">
    <h2>بيانات الطالب والمعلم</h2>

    <div class="grid">
      <div>
        <label>اسم المدرسة</label>
        <input id="school" type="text" placeholder="اكتب اسم المدرسة">
      </div>

      <div>
        <label>التاريخ</label>
        <input id="date" type="date">
      </div>

      <div>
        <label>اسم الطالب</label>
        <input id="student" type="text" placeholder="اكتب اسم الطالب">
      </div>

      <div>
        <label>الصف / الفصل</label>
        <input id="className" type="text" placeholder="مثال: ثالث متوسط / 2">
      </div>

      <div>
        <label>اسم المعلم</label>
        <input id="teacher" type="text" placeholder="اكتب اسم المعلم">
      </div>

      <div>
        <label>المادة / الحصة</label>
        <input id="subject" type="text" placeholder="مثال: لغتي / الحصة الثالثة">
      </div>
    </div>
  </div>

  <div class="box">
    <h2>اختيار المشكلة السلوكية</h2>

    <div class="grid">
      <div>
        <label>المرحلة</label>
        <select id="stage" onchange="loadDegrees()">
          <option value="">اختر المرحلة</option>
          <option value="primary">المرحلة الابتدائية</option>
          <option value="middleHigh">المرحلة المتوسطة والثانوية</option>
        </select>
      </div>

      <div>
        <label>درجة المشكلة</label>
        <select id="degree" onchange="loadProblems()">
          <option value="">اختر الدرجة</option>
        </select>
      </div>

      <div>
        <label>المشكلة السلوكية</label>
        <select id="problem" onchange="fillDetails()">
          <option value="">اختر المشكلة</option>
        </select>
      </div>

      <div>
        <label>عدد مرات التكرار</label>
        <input id="repeat" type="number" min="1" value="1">
      </div>
    </div>

    <label style="margin-top:15px;">وصف مختصر للموقف</label>
    <textarea id="description" placeholder="اكتب وصفًا مختصرًا لما حدث"></textarea>

    <label>الإجراء المتخذ</label>
    <textarea id="action" placeholder="سيظهر الإجراء المقترح تلقائيًا، ويمكنك تعديله"></textarea>

    <label>مدى استجابة الطالب</label>
    <textarea id="response" placeholder="مثال: استجاب للتوجيه / لم يستجب / يحتاج متابعة"></textarea>

    <label>ملاحظات إضافية</label>
    <textarea id="notes" placeholder="أي ملاحظات إضافية"></textarea>

    <label>توقيع المعلم</label>
    <input id="signature" type="text" placeholder="اكتب اسم المعلم للتوقيع">

    <div class="btns">
      <button class="primary" onclick="buildReport()">معاينة النموذج</button>
      <button class="dark" onclick="downloadPDF()">تصدير PDF</button>
      <button class="gray" onclick="clearForm()">مسح البيانات</button>
    </div>
  </div>

  <div class="box" id="previewBox">
    <h2>معاينة النموذج</h2>

    <div id="report"></div>

    <div class="btns">
      <button class="dark" onclick="downloadPDF()">تصدير PDF</button>
    </div>
  </div>

</main>

<footer>
  نموذج إلكتروني مساعد لرصد المشكلات السلوكية
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

          "حيازة آلة حادة",
          "الجرائم المعلوماتية",
          "إظهار صور أو شعارات تدل على الشذوذ أو الترويج لها",
          "التنمر بجميع أنواعه وأشكاله",

      "الدرجة الأولى - حسم درجة واحدة": {

          "التأخر عن الاصطفاف الصباحي",
          "التأخر في الدخول إلى الحصة",
          "تناول الأطعمة أو المشروبات أثناء الدرس دون استئذان",
          "النوم داخل الفصل",

          "تكرار الخروج والدخول دون إذن"

        problems: [
          "الإساءة أو الاستهزاء بشيء من شعائر الإسلام",

  document.getElementById("date").valueAsDate = new Date();

  function value(id) {
    return document.getElementById(id).value || "غير محدد";
  }

  function loadDegrees() {
    const stage = document.getElementById("stage").value;
    const degree = document.getElementById("degree");
    const problem = document.getElementById("problem");

    degree.innerHTML = '<option value="">اختر الدرجة</option>';
    problem.innerHTML = '<option value="">اختر المشكلة</option>';

    if (!stage) return;

    Object.keys(data[stage]).forEach(key => {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = key;
      degree.appendChild(option);
    });
  }

  function loadProblems() {
    const stage = document.getElementById("stage").value;
    const degree = document.getElementById("degree").value;
    const problem = document.getElementById("problem");

    problem.innerHTML = '<option value="">اختر المشكلة</option>';

    if (!stage || !degree) return;

    data[stage][degree].problems.forEach(item => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      problem.appendChild(option);
    });

    document.getElementById("action").value = data[stage][degree].action;
  }

  function fillDetails() {
    const stage = document.getElementById("stage").value;
    const degree = document.getElementById("degree").value;

    if (stage && degree) {
      document.getElementById("action").value = data[stage][degree].action;
    }
  }

  function buildReport() {
    const stageText = document.getElementById("stage").selectedOptions[0]?.textContent || "غير محدد";
    const degree = value("degree");
    const problem = value("problem");

    let discount = "غير محدد";

    const stage = document.getElementById("stage").value;
    if (stage && degree && data[stage][degree]) {
      discount = data[stage][degree].discount;
    }

    const report = document.getElementById("report");

    report.innerHTML = `
      <div class="report-head">
        <h1>نموذج رصد مشكلة سلوكية</h1>
        <p>وفق قواعد السلوك والمواظبة لطلاب وطالبات التعليم العام</p>
      </div>

      <div class="report-grid">
        <div class="item"><strong>اسم المدرسة:</strong><br>${value("school")}</div>
        <div class="item"><strong>التاريخ:</strong><br>${value("date")}</div>
        <div class="item"><strong>اسم الطالب:</strong><br>${value("student")}</div>
        <div class="item"><strong>الصف / الفصل:</strong><br>${value("className")}</div>
        <div class="item"><strong>اسم المعلم:</strong><br>${value("teacher")}</div>
        <div class="item"><strong>المادة / الحصة:</strong><br>${value("subject")}</div>
        <div class="item"><strong>المرحلة:</strong><br>${stageText}</div>
        <div class="item"><strong>درجة المشكلة:</strong><br>${degree}</div>
        <div class="item"><strong>مقدار الحسم:</strong><br>${discount}</div>
        <div class="item"><strong>عدد مرات التكرار:</strong><br>${value("repeat")}</div>
      </div>

      <div class="section-title">المشكلة السلوكية</div>
      <div class="section">${problem}</div>

      <div class="section-title">وصف الموقف</div>
      <div class="section">${value("description")}</div>

      <div class="section-title">الإجراء المتخذ</div>
      <div class="section">${value("action")}</div>

      <div class="section-title">مدى استجابة الطالب</div>
      <div class="section">${value("response")}</div>

      <div class="section-title">ملاحظات إضافية</div>
      <div class="section">${value("notes")}</div>

      <div class="signatures">
        <div class="sig">
          توقيع المعلم<br>
          ${value("signature")}
        </div>

        <div class="sig">
          توقيع الموجه الطلابي
        </div>

        <div class="sig">
          اعتماد إدارة المدرسة
        </div>
      </div>
    `;

    document.getElementById("previewBox").style.display = "block";
    document.getElementById("previewBox").scrollIntoView({ behavior: "smooth" });
  }

  async function downloadPDF() {
    buildReport();

    await new Promise(resolve => setTimeout(resolve, 500));

    const original = document.getElementById("report");
    const clone = original.cloneNode(true);

    clone.style.width = "794px";
    clone.style.minHeight = "1123px";
    clone.style.background = "#ffffff";
    clone.style.padding = "35px";
    clone.style.position = "absolute";
    clone.style.top = "0";
    clone.style.left = "-9999px";
    clone.style.direction = "rtl";
    clone.style.fontFamily = "Tahoma, Arial, sans-serif";

    document.body.appendChild(clone);

    const canvas = await html2canvas(clone, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true
    });

    document.body.removeChild(clone);

    const imgData = canvas.toDataURL("image/jpeg", 1.0);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageWidth = 210;
    const pageHeight = 297;

    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const studentName = value("student").replace(/[\\/:*?"<>|]/g, "");
    pdf.save("رصد مشكلة سلوكية - " + studentName + ".pdf");
  }

  function clearForm() {
    document.querySelectorAll("input, textarea").forEach(el => {
      if (el.type !== "date") el.value = "";
    });

    document.getElementById("date").valueAsDate = new Date();
    document.getElementById("stage").value = "";
    document.getElementById("degree").innerHTML = '<option value="">اختر الدرجة</option>';
    document.getElementById("problem").innerHTML = '<option value="">اختر المشكلة</option>';
    document.getElementById("report").innerHTML = "";
    document.getElementById("previewBox").style.display = "none";
    document.getElementById("repeat").value = 1;
  }
</script>
