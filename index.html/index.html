<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج رصد مشكلة سلوكية</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Tahoma, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #1f2937;
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, #0f766e, #2563eb);
      color: white;
      padding: 35px 8%;
      text-align: center;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    main {
      padding: 35px 8%;
      max-width: 1100px;
      margin: auto;
    }

    .box {
      background: white;
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 0;
      color: #0f766e;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .procedure-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .procedure-btn {
      background: #eef6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .procedure-btn.active {
      background: #2563eb;
      color: white;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .dark {
      background: #111827;
      color: white;
    }

    .gray {
      background: #6b7280;
      color: white;
    }

    #previewBox {
      display: none;
    }

    #report {
      background: white;
      width: 794px;
      min-height: 1123px;
      margin: auto;
      padding: 28px;
      direction: rtl;
      color: #111827;
    }

    .report-head {
      text-align: center;
      border-bottom: 3px solid #0f766e;
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .report-head h1 {
      margin: 0;
      font-size: 24px;
    }

    .report-head p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #374151;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .report-table td {
      border: 1px solid #cbd5e1;
      padding: 7px;
      width: 50%;
      vertical-align: top;
    }

    .report-table strong {
      color: #0f766e;
    }

    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .report-section {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      min-height: 100px;
      font-size: 13px;
      white-space: pre-line;
    }

    .report-section strong {
      display: block;
      color: #2563eb;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .wide {
      grid-column: span 2;
    }

    .signatures {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
    }

    .sig {
      border-top: 1px solid #111827;
      padding-top: 8px;
      min-height: 50px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111827;
      color: white;
      margin-top: 30px;
    }

    @media (max-width: 800px) {
      .grid,
      .two-columns,
      .signatures {
        grid-template-columns: 1fr;
      }

      .wide {
        grid-column: span 1;
      }

      #report {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>نموذج رصد مشكلة سلوكية</h1>
  <p>خاص بالمعلم والموجه الطلابي وفق قواعد السلوك والمواظبة الأصدارالخامس1447هـ 
  إعداد دخيل العصيمي</p>
</header>

<main>

  <div class="box">
    <h2>بيانات الطالب والمعلم</h2>

    <div class="grid">
      <div>
        <label>اسم المدرسة</label>
        <input id="school" type="text" placeholder="اكتب اسم المدرسة">
      </div>

      <div>
        <label>التاريخ</label>
        <input id="date" type="date">
      </div>

      <div>
        <label>اسم الطالب</label>
        <input id="student" type="text" placeholder="اكتب اسم الطالب">
      </div>

      <div>
        <label>الصف / الفصل</label>
        <input id="className" type="text" placeholder="مثال: ثالث متوسط / 2">
      </div>

      <div>
        <label>اسم المعلم</label>
        <input id="teacher" type="text" placeholder="اكتب اسم المعلم">
      </div>

      <div>
        <label>المادة / الحصة</label>
        <input id="subject" type="text" placeholder="مثال: لغتي / الحصة الثالثة">
      </div>
    </div>
  </div>

  <div class="box">
    <h2>اختيار المشكلة السلوكية</h2>

    <div class="grid">
      <div>
        <label>المرحلة</label>
        <select id="stage" onchange="loadDegrees()">
          <option value="">اختر المرحلة</option>
          <option value="primary">المرحلة الابتدائية</option>
          <option value="middleHigh">المرحلة المتوسطة والثانوية</option>
        </select>
      </div>

      <div>
        <label>درجة المشكلة</label>
        <select id="degree" onchange="loadProblems()">
          <option value="">اختر الدرجة</option>
        </select>
      </div>

      <div>
        <label>المشكلة السلوكية</label>
        <select id="problem">
          <option value="">اختر المشكلة</option>
        </select>
      </div>

      <div>
        <label>عدد مرات التكرار</label>
        <input id="repeat" type="number" min="1" value="1">
      </div>
    </div>

    <label>اختر الإجراء التربوي</label>
    <div id="procedureButtons" class="procedure-buttons"></div>

    <label>وصف مختصر للموقف</label>
    <textarea id="description" placeholder="اكتب وصفًا مختصرًا لما حدث"></textarea>

    <label>الإجراء التربوي المطلوب عمله</label>
    <textarea id="action" placeholder="اختر الإجراء المناسب ليظهر المطلوب عمله تلقائيًا"></textarea>

    <label>مدى استجابة الطالب</label>
    <textarea id="response" placeholder="مثال: استجاب للتوجيه / لم يستجب / يحتاج متابعة"></textarea>

    <label>توقيع المعلم</label>
    <input id="signature" type="text" placeholder="اكتب اسم المعلم للتوقيع">

    <div class="btns">
      <button class="primary" onclick="buildReport()">معاينة النموذج</button>
      <button class="dark" onclick="downloadPDF()">تصدير PDF</button>
      <button class="gray" onclick="clearForm()">مسح البيانات</button>
    </div>
  </div>

  <div class="box" id="previewBox">
    <h2>معاينة النموذج</h2>
    <div id="report"></div>

    <div class="btns">
      <button class="dark" onclick="downloadPDF()">تصدير PDF</button>
    </div>
  </div>

</main>

<footer>
  نموذج إلكتروني مساعد لرصد المشكلات السلوكية
</footer>

  document.getElementById("date").valueAsDate = new Date();

  function value(id) {
    return document.getElementById(id).value || "غير محدد";
  }

  function loadDegrees() {
    const stage = document.getElementById("stage").value;
    const degree = document.getElementById("degree");
    const problem = document.getElementById("problem");

    degree.innerHTML = '<option value="">اختر الدرجة</option>';
    problem.innerHTML = '<option value="">اختر المشكلة</option>';
    document.getElementById("procedureButtons").innerHTML = "";
    document.getElementById("action").value = "";

    if (!stage) return;

    Object.keys(data[stage]).forEach(key => {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = key;
      degree.appendChild(option);
    });
  }

  function loadProblems() {
    const stage = document.getElementById("stage").value;
    const degree = document.getElementById("degree").value;
    const problem = document.getElementById("problem");

    problem.innerHTML = '<option value="">اختر المشكلة</option>';
    document.getElementById("procedureButtons").innerHTML = "";
    document.getElementById("action").value = "";

    if (!stage || !degree) return;

    data[stage][degree].problems.forEach(item => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      problem.appendChild(option);
    });

    loadProcedures();
  }

  function loadProcedures() {
    const stage = document.getElementById("stage").value;
    const degree = document.getElementById("degree").value;
    const box = document.getElementById("procedureButtons");

    box.innerHTML = "";

    if (!stage || !degree) return;

    const procedures = data[stage][degree].procedures;

    procedures.forEach((item, index) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "procedure-btn";
      btn.innerHTML = item.icon + " " + item.title;

      btn.onclick = function () {
        document.querySelectorAll(".procedure-btn").forEach(b => {
          b.classList.remove("active");
        });

        btn.classList.add("active");
        document.getElementById("action").value = item.text;
      };

      box.appendChild(btn);

      if (index === 0) {
        btn.click();
      }
    });
  }

  function buildReport() {
    const stageText =
      document.getElementById("stage").selectedOptions[0]?.textContent || "غير محدد";

    const degree = value("degree");
    const problem = value("problem");
    const stage = document.getElementById("stage").value;

    let discount = "غير محدد";

    if (stage && degree && data[stage][degree]) {
      discount = data[stage][degree].discount;
    }

    const report = document.getElementById("report");

    report.innerHTML = `
      <div class="report-head">
        <h1>نموذج رصد مشكلة سلوكية</h1>
        <p>وفق قواعد السلوك والمواظبة لطلاب وطالبات التعليم العام</p>
      </div>

      <table class="report-table">
        <tr>
          <td><strong>اسم المدرسة:</strong><br>${value("school")}</td>
          <td><strong>التاريخ:</strong><br>${value("date")}</td>
        </tr>

        <tr>
          <td><strong>اسم الطالب:</strong><br>${value("student")}</td>
          <td><strong>الصف / الفصل:</strong><br>${value("className")}</td>
        </tr>

        <tr>
          <td><strong>اسم المعلم:</strong><br>${value("teacher")}</td>
          <td><strong>المادة / الحصة:</strong><br>${value("subject")}</td>
        </tr>

        <tr>
          <td><strong>المرحلة:</strong><br>${stageText}</td>
          <td><strong>درجة المشكلة:</strong><br>${degree}</td>
        </tr>

        <tr>
          <td><strong>مقدار الحسم:</strong><br>${discount}</td>
          <td><strong>عدد مرات التكرار:</strong><br>${value("repeat")}</td>
        </tr>
      </table>

      <div class="two-columns">

        <div class="report-section">
          <strong>المشكلة السلوكية</strong>
          ${problem}
        </div>

        <div class="report-section">
          <strong>وصف الموقف</strong>
          ${value("description")}
        </div>

        <div class="report-section">
          <strong>الإجراء التربوي المطلوب</strong>
          ${value("action")}
        </div>

        <div class="report-section">
          <strong>مدى استجابة الطالب</strong>
          ${value("response")}
        </div>

      </div>

      <div class="signatures">
        <div class="sig">
          توقيع المعلم<br>
          ${value("signature")}
        </div>

        <div class="sig">
          توقيع الموجه الطلابي
        </div>

        <div class="sig">
          اعتماد إدارة المدرسة
        </div>
      </div>
    `;

    document.getElementById("previewBox").style.display = "block";
    document.getElementById("previewBox").scrollIntoView({ behavior: "smooth" });
  }

  async function downloadPDF() {
    buildReport();

    await new Promise(resolve => setTimeout(resolve, 500));

    const original = document.getElementById("report");
    const clone = original.cloneNode(true);

    clone.style.width = "794px";
    clone.style.minHeight = "1123px";
    clone.style.background = "#ffffff";
    clone.style.padding = "28px";
    clone.style.position = "absolute";
    clone.style.top = "0";
    clone.style.left = "-9999px";
    clone.style.direction = "rtl";
    clone.style.fontFamily = "Tahoma, Arial, sans-serif";

    document.body.appendChild(clone);

    const canvas = await html2canvas(clone, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true
    });

    document.body.removeChild(clone);

    const imgData = canvas.toDataURL("image/jpeg", 1.0);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageWidth = 210;
    const pageHeight = 297;

    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const studentName = value("student").replace(/[\\/:*?"<>|]/g, "");
    pdf.save("رصد مشكلة سلوكية - " + studentName + ".pdf");
  }

  function clearForm() {
    document.querySelectorAll("input, textarea").forEach(el => {
      if (el.type !== "date") el.value = "";
    });

    document.getElementById("date").valueAsDate = new Date();
    document.getElementById("stage").value = "";
    document.getElementById("degree").innerHTML = '<option value="">اختر الدرجة</option>';
    document.getElementById("problem").innerHTML = '<option value="">اختر المشكلة</option>';
    document.getElementById("procedureButtons").innerHTML = "";
    document.getElementById("report").innerHTML = "";
    document.getElementById("previewBox").style.display = "none";
    document.getElementById("repeat").value = 1;
  }
</script>
